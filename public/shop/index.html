              <div class="price-input-wrap">
                <span class="price-prefix">$</span>
                <input type="number" id="edit-price" step="0.01" min="0" value="${item.price_cents != null ? (item.price_cents / 100).toFixed(2) : ''}">
              </div>
            </div>
          </div>
        </div>
        <div class="input-group">
          <label>Condition</label>
          <select id="edit-condition">
            <option value="">Select condition</option>
            <option value="new" ${item.condition === 'new' ? 'selected' : ''}>New</option>
            <option value="like_new" ${item.condition === 'like_new' ? 'selected' : ''}>Like New</option>
            <option value="good" ${item.condition === 'good' ? 'selected' : ''}>Good</option>
            <option value="fair" ${item.condition === 'fair' ? 'selected' : ''}>Fair</option>
            <option value="poor" ${item.condition === 'poor' ? 'selected' : ''}>Poor</option>
          </select>
        </div>
        <div class="input-group">
          <label>Vendor Notes (private)</label>
          <input type="text" id="edit-notes" placeholder="Notes for yourself..." value="${esc(item.vendor_notes || '')}">
        </div>
        <div class="collapsible-header" id="additional-toggle">
          Additional Options <span class="arrow">&#9660;</span>
        </div>
        <div class="collapsible-content" id="additional-content">
          <div style="padding:8px 0;">
            <div class="input-group">
              <label>Description</label>
              <textarea id="edit-desc">${esc(item.description || '')}</textarea>
            </div>
            <div class="input-group">
              <label>Category</label>
              <input type="text" id="edit-category" value="${esc(item.category || '')}">
            </div>
          </div>
        </div>
        <div style="height:80px;"></div>
      `;
    }

    // Collapsible toggle
    const toggleBtn = $('#additional-toggle', contentDiv);
    const toggleContent = $('#additional-content', contentDiv);
    if (toggleBtn && toggleContent) {
      toggleBtn.addEventListener('click', () => {
        toggleBtn.classList.toggle('open');
        toggleContent.classList.toggle('open');
      });
    }

    // Type mismatch banner handlers
    const switchBtn = $('#switch-type-btn', contentDiv);
    const dismissBtn = $('#dismiss-mismatch-btn', contentDiv);
    if (switchBtn) {
      switchBtn.addEventListener('click', async () => {
        try {
          await api('PUT', '/api/items/' + item.id, { session_token: getToken(), type: 'food', type_mismatch: false });
          item.type = 'food';
          item.type_mismatch = false;
          toast('Switched to food item', 'success');
          loadEditItem(root, itemId);
        } catch(e) { toast(e.message, 'error'); }
      });
    }
    if (dismissBtn) {
      dismissBtn.addEventListener('click', async () => {
        try {
          await api('PUT', '/api/items/' + item.id, { session_token: getToken(), type_mismatch: false });
          item.type_mismatch = false;
          const banner = $('#mismatch-banner', contentDiv);
          if (banner) banner.remove();
        } catch(e) { toast(e.message, 'error'); }
      });
    }

    // Spice radio pills (food only)
    if (isFood) {
      let currentSpice = item.spice_level || 'none';
      $$('#spice-radios .radio-pill', contentDiv).forEach(pill => {
        pill.addEventListener('click', () => {
          $$('#spice-radios .radio-pill', contentDiv).forEach(p => p.classList.remove('active'));
          pill.classList.add('active');
          currentSpice = pill.dataset.spice;
        });
      });
    }

    // Check-row styling
    $$('.check-row input[type="checkbox"]', contentDiv).forEach(cb => {
      cb.addEventListener('change', () => {
        cb.closest('.check-row').classList.toggle('checked', cb.checked);
      });
    });

    // Bottom nav bar
    const existingNav = document.querySelector('.edit-bottom-nav');
    if (existingNav) existingNav.remove();

    const nav = document.createElement('div');
    nav.className = 'edit-bottom-nav';
    nav.innerHTML = `
      <button class="nav-btn" id="nav-prior" ${!hasPrior ? 'disabled' : ''}>&larr; Prior</button>
      <button class="nav-btn nav-save" id="nav-save">Save</button>
      <button class="nav-btn nav-hide" id="nav-hide">Hide</button>
      <button class="nav-btn" id="nav-next" ${!hasNext ? 'disabled' : ''}>Next &rarr;</button>
    `;
    document.body.appendChild(nav);

    // Clean up nav on hash change
    const cleanupNav = () => {
      nav.remove();
      window.removeEventListener('hashchange', cleanupNav);
    };
    window.addEventListener('hashchange', cleanupNav);

    // Prior
    $('#nav-prior', nav).addEventListener('click', () => {
      if (hasPrior) {
        navigate('#edit/' + editableItems[currentIdx - 1].id);
      }
    });

    // Next
    $('#nav-next', nav).addEventListener('click', () => {
      if (hasNext) {
        navigate('#edit/' + editableItems[currentIdx + 1].id);
      }
    });

    // Save
    $('#nav-save', nav).addEventListener('click', async () => {
      const saveBtn = $('#nav-save', nav);
      saveBtn.textContent = 'Saving...';
      saveBtn.disabled = true;

      const priceVal = parseFloat($('#edit-price', contentDiv).value);
      const priceCents = isNaN(priceVal) ? 0 : Math.round(priceVal * 100);

      const updateData = {
        title: $('#edit-title', contentDiv).value.trim(),
        price_cents: priceCents,
        session_token: getToken(),
      };

      if (isFood) {
        updateData.optional_proteins = ($('#edit-proteins', contentDiv) || {}).value || '';
        updateData.description = ($('#edit-desc', contentDiv) || {}).value || '';

        // Spice level
        const activeSpice = $('#spice-radios .radio-pill.active', contentDiv);
        updateData.spice_level = activeSpice ? activeSpice.dataset.spice : 'none';
        if (updateData.spice_level === 'none') updateData.spice_level = null;

        // Build spice_options string for backend compatibility
        updateData.spice_options = updateData.spice_level || null;

        // Dietary flags - pass as part of description or as separate fields
        const dietChecks = {
          dietary_vegetarian: ($('#diet-vegetarian', contentDiv) || {}).checked || false,
          dietary_vegan: ($('#diet-vegan', contentDiv) || {}).checked || false,
          dietary_gluten_free: ($('#diet-gluten-free', contentDiv) || {}).checked || false,
          dietary_dairy_free: ($('#diet-dairy-free', contentDiv) || {}).checked || false,
          dietary_nut_free: ($('#diet-nut-free', contentDiv) || {}).checked || false,
        };
        Object.assign(updateData, dietChecks);
      } else {
        updateData.condition = ($('#edit-condition', contentDiv) || {}).value || null;
        updateData.vendor_notes = ($('#edit-notes', contentDiv) || {}).value || null;
        updateData.description = ($('#edit-desc', contentDiv) || {}).value || '';
        updateData.category = ($('#edit-category', contentDiv) || {}).value || null;
      }

      try {
        const updated = await api('PUT', '/api/items/' + item.id, updateData);
        // Update local state
        const idx = state.items.findIndex(i => String(i.id) === String(item.id));
        if (idx >= 0) {
          state.items[idx] = { ...state.items[idx], ...updateData, ...updated };
        }
        state.currentItem = { ...item, ...updateData, ...updated };
        toast('Saved!', 'success');
      } catch(e) {
        toast(e.message || 'Save failed', 'error');
      } finally {
        saveBtn.textContent = 'Save';
        saveBtn.disabled = false;
      }
    });

    // Hide
    $('#nav-hide', nav).addEventListener('click', async () => {
      const hideBtn = $('#nav-hide', nav);
      hideBtn.textContent = 'Hiding...';
      hideBtn.disabled = true;

      try {
        await api('PUT', '/api/items/' + item.id, {
          status: 'removed',
          session_token: getToken(),
        });
        // Remove from local state
        const idx = state.items.findIndex(i => String(i.id) === String(item.id));
        if (idx >= 0) {
          state.items[idx].status = 'removed';
        }
        toast('Item hidden', 'success');
        // Navigate to next if available
        if (hasNext) {
          navigate('#edit/' + editableItems[currentIdx + 1].id);
        } else if (hasPrior) {
          navigate('#edit/' + editableItems[currentIdx - 1].id);
        } else {
          navigate('#vendor');
        }
      } catch(e) {
        toast(e.message || 'Failed to hide', 'error');
        hideBtn.textContent = 'Hide';
        hideBtn.disabled = false;
      }
    });
  }

  // ---------- #vendor (Vendor Dashboard) ----------
  function renderVendorDashboard(root) {
    const token = getToken();
    if (!token) { navigate('#home'); return; }

    root.innerHTML = `
      <div class="header">
        <button class="back-btn" onclick="location.hash='#home'">&larr;</button>
        <h2>My Booth</h2>
      </div>
      <div id="vendor-header"></div>
      <div id="vendor-stats"></div>
      <div id="vendor-items"><div class="center muted" style="padding:24px;">Loading...</div></div>
      <div class="spacer"></div>
      <div id="vendor-actions"></div>
    `;

    loadVendorDashboardData(root);
  }

  async function loadVendorDashboardData(root) {
    const token = getToken();
    try {
      const data = await api('GET', '/api/vendors/me?session=' + encodeURIComponent(token));
      let vendor, items;
      if (data.vendor) {
        vendor = data.vendor;
        items = data.items || [];
      } else {
        vendor = data;
        items = data.items || [];
      }
      state.vendor = vendor;
      state.items = items;
      save('vendor', vendor);

      // Refresh event data too
      if (vendor.event_id && (!state.event || state.event.id !== vendor.event_id)) {
        try {
          const ev = await api('GET', '/api/events/by-id/' + vendor.event_id);
          saveSession(null, ev);
        } catch(e) {}
      }

      const isLive = vendor.status === 'live' || vendor.is_live;

      // Header with name and logo
      const headerDiv = $('#vendor-header', root);
      if (headerDiv) {
        headerDiv.innerHTML = `
          <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px;">
            ${vendor.logo_url ? '<img class="vendor-logo-small" src="' + esc(vendor.logo_url) + '" alt="" onerror="this.style.display=\'none\'">' : ''}
            <div>
              <h2 style="margin:0;">${esc(vendor.display_name || 'My Booth')}</h2>
              ${vendor.booth_location ? '<p class="muted small">' + esc(vendor.booth_location) + '</p>' : ''}
            </div>
          </div>
          <div class="status-bar ${isLive ? 'status-live' : 'status-preview'}">
            <div class="dot"></div>
            ${isLive ? 'Your booth is LIVE' : 'Preview Mode -- Not visible to buyers yet'}
          </div>
        `;
      }

      // Stats
      const draftCount = items.filter(i => i.status === 'draft' || i.status === 'approved').length;
      const listedCount = items.filter(i => i.status === 'listed').length;
      const statsDiv = $('#vendor-stats', root);
      if (statsDiv) {
        statsDiv.innerHTML = `
          <div class="stats-row">
            <div class="stat-box">
              <div class="stat-num">${draftCount}</div>
              <div class="stat-label">Drafts</div>
            </div>
            <div class="stat-box">
              <div class="stat-num">${listedCount}</div>
              <div class="stat-label">Listed</div>
            </div>
          </div>
        `;
      }

      // Items list - sorted: drafts first, then listed, then sold
      const itemsDiv = $('#vendor-items', root);
      if (itemsDiv) {
        const statusOrder = { draft: 0, approved: 1, listed: 2, sold: 3, removed: 4 };
        const sortedItems = [...items].sort((a, b) => (statusOrder[a.status] || 5) - (statusOrder[b.status] || 5));

        if (!sortedItems.length) {
          itemsDiv.innerHTML = `
            <div class="empty-state">
              <div class="empty-icon">&#128247;</div>
              <p>No items yet</p>
              <p class="small muted">Add photos to list your items</p>
            </div>
          `;
        } else {
          itemsDiv.innerHTML = sortedItems.map(item => `
            <div class="vendor-item" data-id="${esc(item.id)}">
              <img src="${photoUrl(item) ? esc(photoUrl(item)) : placeholderImg()}" alt="" onerror="this.src='${placeholderImg()}'">
              <div class="vendor-item-info">
                <div class="item-title">${esc(item.title || 'Untitled')}</div>
                <div class="item-meta">
                  <span style="color:var(--accent);font-weight:700;">${cents(item.price_cents)}</span>
                  <span class="badge ${badgeClass(item.status)}">${esc(item.status || 'draft')}</span>
                </div>
              </div>
            </div>
          `).join('');

          $$('.vendor-item', itemsDiv).forEach(el => {
            el.addEventListener('click', () => navigate('#edit/' + el.dataset.id));
          });
        }
      }

      // Actions
      const actionsDiv = $('#vendor-actions', root);
      if (actionsDiv) {
        const feeCents = (state.event && state.event.vendor_fee_cents) ? state.event.vendor_fee_cents : 999;
        const feeDisplay = (feeCents / 100).toFixed(2);

        actionsDiv.innerHTML = `
          <button class="btn btn-secondary" id="add-more-btn">&#128247; Add More Photos</button>
          <input type="file" id="add-more-input" accept="image/*" multiple style="display:none;">
          <div class="spacer"></div>
          ${!isLive ? '<button class="go-live-btn" id="golive-btn">Go Live -- $' + feeDisplay + '</button>' : ''}
        `;

        const addMoreBtn = $('#add-more-btn', actionsDiv);
        const addMoreInput = $('#add-more-input', actionsDiv);
        addMoreBtn.addEventListener('click', () => addMoreInput.click());

        addMoreInput.addEventListener('change', async (e) => {
          const files = Array.from(e.target.files);
          if (!files.length) return;

          addMoreBtn.disabled = true;
          addMoreBtn.textContent = 'Uploading...';

          const vendorType = vendor.vendor_type === 'food' ? 'food' : 'product';
          let completed = 0;
          let failed = 0;

          for (let i = 0; i < files.length; i++) {
            addMoreBtn.textContent = 'Analyzing ' + (i + 1) + ' of ' + files.length + '...';
            try {
              const fd = new FormData();
              fd.append('photo', files[i]);
              fd.append('event_id', getEventId() || vendor.event_id);
              fd.append('vendor_id', vendor.id);
              fd.append('session_token', getToken());
              fd.append('type', vendorType);

              const item = await api('POST', '/api/items', fd, true);
              state.items.push(item);
              completed++;
            } catch(e) {
              failed++;
            }
          }

          toast(completed + ' item' + (completed !== 1 ? 's' : '') + ' added!' + (failed ? ' (' + failed + ' failed)' : ''), 'success');
          loadVendorDashboardData(root);
        });

        const liveBtn = $('#golive-btn', actionsDiv);
        if (liveBtn) {
          liveBtn.addEventListener('click', () => goLive());
        }
      }

    } catch(e) {
      const itemsDiv = $('#vendor-items', root);
      if (itemsDiv) {
        itemsDiv.innerHTML = '<div class="center" style="padding:24px;"><p class="muted">Failed to load booth</p><p class="small muted">' + esc(e.message) + '</p><div class="spacer"></div><button class="btn btn-secondary btn-small" onclick="location.reload()">Retry</button></div>';
      }
    }
  }

  async function goLive() {
    const token = getToken();
    const vendorId = getVendorId();
    if (!token || !vendorId) { toast('Session expired', 'error'); navigate('#home'); return; }

    showSpinner('Redirecting to checkout...');
    try {
      const data = await api('POST', '/api/checkout', {
        vendor_id: vendorId,
        session_token: token,
      });
      if (data.checkout_url) {
        window.location = data.checkout_url;
      } else {
        throw new Error('No checkout URL returned');
      }
    } catch(e) {
      hideSpinner();
      toast(e.message || 'Checkout failed', 'error');
    }
  }

  // ---------- #create-event (Create Event Page) ----------
  function renderCreateEvent(root) {
    root.innerHTML = `
      <div class="header">
        <button class="back-btn" onclick="location.hash='#home'">&larr;</button>
        <h2>Create Event</h2>
      </div>
      <div id="create-form">
        <div class="card">
          <div class="input-group">
            <label>Event Name *</label>
            <input type="text" id="evt-name" placeholder="e.g. Spring Community Sale">
          </div>
          <div class="input-group">
            <label>Event Type</label>
            <select id="evt-type">
              <option value="marketplace">Marketplace (Shop + Menu)</option>
              <option value="menu">Food Menu Only</option>
            </select>
          </div>
          <div class="input-group">
            <label>Description</label>
            <textarea id="evt-desc" placeholder="Tell people about your event..."></textarea>
          </div>
          <div class="input-group">
            <label>Location</label>
            <input type="text" id="evt-location" placeholder="e.g. Central Park Pavilion">
          </div>
          <div class="input-group">
            <label>Start Date & Time</label>
            <input type="datetime-local" id="evt-start">
          </div>
          <div class="input-group">
            <label>End Date & Time</label>
            <input type="datetime-local" id="evt-end">
          </div>
          <div class="spacer"></div>
          <button class="btn btn-primary" id="create-btn">Create Event</button>
        </div>
      </div>
      <div id="create-result" style="display:none;"></div>
    `;

    $('#create-btn', root).addEventListener('click', async () => {
      const name = $('#evt-name', root).value.trim();
      if (!name) { toast('Event name is required', 'error'); return; }

      const btn = $('#create-btn', root);
      btn.disabled = true;
      btn.textContent = 'Creating...';

      const startVal = $('#evt-start', root).value;
      const endVal = $('#evt-end', root).value;

      try {
        const event = await api('POST', '/api/events', {
          name: name,
          type: $('#evt-type', root).value || 'marketplace',
          description: $('#evt-desc', root).value.trim() || null,
          location_name: $('#evt-location', root).value.trim() || null,
          starts_at: startVal ? new Date(startVal).toISOString() : null,
          ends_at: endVal ? new Date(endVal).toISOString() : null,
          status: 'pending',
        });

        $('#create-form', root).style.display = 'none';
        const resultDiv = $('#create-result', root);
        resultDiv.style.display = 'block';
        resultDiv.innerHTML = `
          <div class="center">
            <div class="spacer-lg"></div>
            <div style="font-size:3rem;margin-bottom:16px;">&#9989;</div>
            <h1>Event Submitted!</h1>
            <p class="muted" style="margin-bottom:24px;">Your event has been submitted for review. You'll be notified when it's approved.</p>
            <div class="card" style="text-align:left;">
              <h3>${esc(event.name || name)}</h3>
              ${event.location_name ? '<p class="muted small">' + esc(event.location_name) + '</p>' : ''}
              ${startVal ? '<p class="muted small">' + formatDateRange(startVal, endVal) + '</p>' : ''}
            </div>
            <div class="spacer"></div>
            <button class="btn btn-primary" onclick="location.hash='#home'">Back to Home</button>
          </div>
        `;

      } catch(e) {
        toast(e.message || 'Failed to create event', 'error');
        btn.disabled = false;
        btn.textContent = 'Create Event';
      }
    });
  }

  // ============================================================
  // INIT
  // ============================================================
  function init() {
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/shop/sw.js').catch(() => {});
    }

    loadSession();
    loadSavedItems();

    if (checkStripeReturn()) return;

    // Check for ?tab=menu param to set initial tab
    const params = new URLSearchParams(window.location.search);
    const tabParam = params.get('tab');
    if (tabParam === 'menu') {
      state.activeTab = 'menu';
      // If we have an event, go directly to browse/menu
      const eventId = getEventId();
      if (eventId && (!window.location.hash || window.location.hash === '#' || window.location.hash === '#home')) {
        window.history.replaceState({}, '', window.location.pathname + window.location.hash);
        window.location.hash = '#browse/' + eventId + '/menu';
        return;
      }
    }

    if (!window.location.hash || window.location.hash === '#' || window.location.hash === '#landing') {
      window.location.hash = '#home';
    }
    render();
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }

})();
</script>
</body>
</html>
