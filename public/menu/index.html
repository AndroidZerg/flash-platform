<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FlashMenu → FlashShop</title>
<script>
  // FlashMenu is now part of FlashShop — redirect with tab=menu
  const params = new URLSearchParams(window.location.search);
  params.set('product', 'shop');
  params.set('tab', 'menu');
  window.location.replace('/?product=shop&tab=menu' + (window.location.hash || ''));
</script>
</head>
<body style="background:#0a0a0f;color:#e0e0e0;font-family:system-ui;display:flex;align-items:center;justify-content:center;height:100vh;margin:0">
  <p>Redirecting to FlashShop...</p>
</body>
</html>
